<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy bird</title>
</head>
<body>
    <h1> flappy bird</h1>
    <canvas width="500" hight="370" id="canvas"></canvas>
    <button id="reset"> reset game</button>
    <h2> conrols: </h2>
    <p>
        w: up
        s: down
    

    </p>
</body>
<script src="script.js"></script>
</html>
<style>
    body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #5827a5, #12051f 55%);
        color: #f3f3f3;
        font-family: 'Press Start 2P', 'Courier New', Courier, monospace;
        text-shadow: 0 0 12px rgba(255, 255, 255, 0.35), 0 0 25px rgba(255, 0, 150, 0.18);
    }

    h1, h2 {
        margin: 0.5rem 0;
        text-transform: uppercase;
        letter-spacing: 0.35rem;
    }

    h1 {
        font-size: clamp(2rem, 5vw, 3rem);
        color: #ffe74c;
        text-shadow:
            0 0 8px rgba(255, 231, 79, 0.9),
            0 0 18px rgba(255, 0, 150, 0.25);
    }

    h2 {
        color: #9ef01a;
        text-shadow: 0 0 8px rgba(158, 240, 26, 0.7);
        font-size: 1rem;
    }

    p {
        max-width: 28rem;
        line-height: 1.6;
        color: #c2d4ff;
        font-size: 0.95rem;
        margin: 0.25rem 0 1.25rem;
    }

    canvas {
        border: 0.35rem solid #f27d00;
        border-radius: 1rem;
        background: linear-gradient(180deg, #140a29 0%, #200a4d 100%);
        box-shadow:
            inset 0 0 40px rgba(255, 255, 255, 0.08),
            0 0 35px rgba(255, 93, 0, 0.45);
        width: 500px;
        height: 370px;
        margin: 1rem 0;
    }

    button {
        cursor: pointer;
        border: 0.18rem solid #82ffbb;
        border-radius: 0.8rem;
        background: linear-gradient(180deg, #12051f 0%, #33005a 100%);
        color: #ffffff;
        padding: 0.95rem 1.5rem;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.25rem;
        box-shadow: 0 0 18px rgba(0, 255, 164, 0.25);
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    button:hover {
        transform: translateY(-2px);
        background: linear-gradient(180deg, #20004e 0%, #590099 100%);
        box-shadow: 0 0 30px rgba(128, 255, 208, 0.45);
    }

    button:active {
        transform: translateY(0);
    }
</style>
